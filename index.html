<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecXpress SFTP Setup</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #2a2a2a; }
    @media print {
      body { margin: 0; }
      @page { size: A4 landscape; margin: 10mm; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ── BRAND ─────────────────────────────────────────────────────────── */
    const BRAND = {
      dark: "#1b2126", accent: "#e63329", light: "#f5f5f5",
      mid: "#e8e8e8", text: "#1b2126", white: "#ffffff",
    };

    /* ── SLIDE DATA ────────────────────────────────────────────────────── */
    const slides = [
      {
        id:1, type:"title",
        title:"RecXpress SFTP Setup",
        subtitle:"A Guide for Business Partners",
        clientTitle:"Automatic Bank Statement Retrieval",
        clientSubtitle:"How RecXpress connects securely to your bank",
        notes:"Welcome slide — introduce the topic of SFTP setup within RecXpress for automated bank statement retrieval.",
      },
      {
        id:2, type:"bullets", icon:"🔒",
        title:"What is SFTP in RecXpress?",
        clientTitle:"What Does This Do For You?",
        points:[
          "SFTP stands for Secure File Transfer Protocol",
          "Enables RecXpress to automatically retrieve bank statements from your bank's SFTP server",
          "Eliminates the need to manually download and import statement files",
          "Configured per bank account inside Sage 300 Cashbook Bank Account setup",
        ],
        clientPoints:[
          "Your bank statements are collected automatically — no manual downloads needed",
          "Statements flow directly into Sage 300 for reconciliation",
          "Saves time and reduces the risk of missing or incorrect imports",
          "Each bank account is configured separately so every account is covered",
        ],
        notes:"Set the scene — SFTP automates statement collection. Stress the per bank nature of setup.",
      },
      {
        id:3, type:"steps",
        title:"Where to Find the Setup",
        clientTitle:"Getting Started in Sage 300",
        steps:[
          {step:"1", label:"Log in to Sage 300"},
          {step:"2", label:"Go to Cashbook > C/B Setup > Bank Accounts"},
          {step:"3", label:"Open the relevant Bank Account"},
          {step:"4", label:"Click the RecXpress tab"},
          {step:"5", label:"Select your Retrieve Statement Method from the dropdown"},
        ],
        notes:"Walk partners through the navigation path. The RecXpress tab is specifically for SFTP setup.",
      },
      {
        id:4, type:"methods",
        title:"Retrieve Statement Methods",
        clientTitle:"How Would You Like to Connect?",
        methods:[
          {name:"Local", icon:"💻", desc:"File downloaded manually to a local or network folder", clientDesc:"You download the file yourself and point RecXpress to it"},
          {name:"Sage Bank Feeds", icon:"🏦", desc:"Automatic live feed — connects directly to your bank (OnPremise only)", clientDesc:"Live connection to your bank — fully automatic (OnPremise only)"},
          {name:"SFTP with Password", icon:"🔑", desc:"Securely transfer using a username and password", clientDesc:"Secure automatic download using your bank-provided login"},
          {name:"SFTP with Key File", icon:"🗝️", desc:"Enhanced security using cryptographic keys instead of passwords", clientDesc:"Higher security option using an encrypted key file"},
          {name:"SFTP 2FA", icon:"🛡️", desc:"Two-factor authentication — highest security level", clientDesc:"Maximum security with two-step verification"},
        ],
        notes:"Most clients using automated retrieval will use SFTP with Password or Key File.",
      },
      {
        id:5, type:"table",
        title:"SFTP Setup Fields Explained",
        clientTitle:"Information You Will Need From Your Bank",
        rows:[
          {field:"Host IP Address", value:"IP address or hostname of the bank's SFTP server", clientValue:"Provided by your bank — the address of their secure file server"},
          {field:"User", value:"Login username provided by the bank", clientValue:"Your SFTP username, provided by your bank"},
          {field:"User Password", value:"Password for the SFTP user (Password method only)", clientValue:"Your SFTP password, provided by your bank"},
          {field:"Key File Path", value:"Path to private key e.g. C:\\SFTPKeys\\Bank\\id_rsa", clientValue:"Location of your security key file on your computer"},
          {field:"Download Path", value:"Folder where downloaded statement files are saved", clientValue:"The folder on your PC where statement files will be stored"},
          {field:"Archive Path", value:"Folder where processed statement files are archived", clientValue:"A folder where processed statements are kept for reference"},
        ],
        notes:"Tip: Host IP and Username must be unique — you cannot duplicate these across bank setups.",
      },
      {
        id:6, type:"keyfile",
        title:"SFTP with Key File: Generating Keys",
        clientTitle:"Setting Up a Security Key File",
        steps:[
          {step:"1", label:"Open Windows Command Prompt (Windows key > type cmd > Enter)"},
          {step:"2", label:"Run: ssh-keygen -m PEM and press Enter"},
          {step:"3", label:"Enter a file path e.g. C:\\SFTPKeys\\JohnSmith\\id_rsa"},
          {step:"4", label:"Enter a passphrase (or press Enter to skip) and confirm"},
          {step:"5", label:"Two files created: id_rsa (keep private) and id_rsa.pub (share with bank)"},
          {step:"6", label:"Enter the id_rsa path in the Key File field in RecXpress SFTP setup"},
        ],
        clientSteps:[
          {step:"1", label:"Your consultant will generate a pair of security key files on your computer"},
          {step:"2", label:"The private key stays on your system and is never shared"},
          {step:"3", label:"The public key (.pub file) is sent to your bank for them to register"},
          {step:"4", label:"Once registered, RecXpress uses the key to authenticate automatically"},
          {step:"5", label:"No password is required — the key handles authentication securely"},
        ],
        warning:"Common error: using the wrong key file or wrong format. Always use ssh-keygen -m PEM.",
        clientNote:"Your bank will confirm when the key is registered and the connection is ready to test.",
        notes:"The .pub file goes to the bank; the private key stays on your server.",
      },
      {
        id:7, type:"bullets", icon:"🧪",
        title:"Testing Your SFTP Connection",
        clientTitle:"Making Sure Everything Works",
        points:[
          "Use the Test Connection button inside the RecXpress SFTP setup screen",
          "RecXpress will attempt to connect using your supplied settings",
          "Connection timeout is approximately 30 seconds if no connection is established",
          "Use View Log to open the SFTP log file (PSRXSecure.log)",
          "The log records all activities: connection attempts, file transfers, archive operations",
          "Check the log file first whenever a test connection fails",
        ],
        clientPoints:[
          "Once setup is complete, click Test Connection to verify everything is working",
          "A successful test confirms your credentials and server details are correct",
          "If the test fails, your consultant will check the connection log to diagnose the issue",
          "No go-live until the test passes — we make sure it works before relying on it",
        ],
        notes:"Always test before going live. The log file is the first place to look when troubleshooting.",
      },
      {
        id:8, type:"rebex",
        title:"Testing Your RecXpress SFTP Setup",
        clientTitle:"We Test Before Connecting to Your Bank",
        intro:"RecXpress includes a built-in Test Connection button to verify your SFTP setup before going live. PSRXSecure.log records all activity for troubleshooting.",
        clientIntro:"Before connecting to your live bank, we run a full test to make sure everything is configured correctly.",
        steps:[
          {step:"1", label:"Open Bank Account setup > RecXpress tab in Sage 300 Cashbook"},
          {step:"2", label:"Enter all SFTP connection details (Host IP, User, Password or Key File)"},
          {step:"3", label:"Click the Test Connection button to attempt a live connection"},
          {step:"4", label:"Click View Log to open PSRXSecure.log and review the connection result"},
          {step:"5", label:"Resolve any errors shown in the log before proceeding"},
          {step:"6", label:"Once the test passes, confirm a statement file is retrieved successfully"},
        ],
        clientSteps:[
          {step:"1", label:"Your consultant enters the SFTP details provided by your bank"},
          {step:"2", label:"A test connection is run directly from RecXpress"},
          {step:"3", label:"The connection log confirms whether the setup is successful"},
          {step:"4", label:"Any issues are resolved before going live — no disruption to your workflow"},
        ],
        notes:"Always verify via the log file, not just the on-screen success message.",
      },
      {
        id:9, type:"tips",
        title:"Key Tips and Common Errors",
        clientTitle:"What to Expect and Common Questions",
        tips:[
          {icon:"⚠️", label:"Unique credentials required", desc:"Cannot duplicate Host IP Address and Username across different bank setups.", clientDesc:"Each bank account needs its own separate SFTP credentials from your bank."},
          {icon:"🔍", label:"Wrong key file format", desc:"Most common Key File error. Always generate keys using ssh-keygen -m PEM.", clientDesc:"If using a key file, your consultant ensures it is generated in the correct format."},
          {icon:"🔐", label:"Incorrect password error", desc:"count must be non-negative typically means the password entered is incorrect.", clientDesc:"Double-check SFTP credentials with your bank if a connection error occurs."},
          {icon:"📋", label:"Always check the log", desc:"PSRXSecure.log records every SFTP activity — first stop for troubleshooting.", clientDesc:"A full activity log is kept, making any issues easy to diagnose."},
          {icon:"👤", label:"Separate user for Automation", desc:"Run RecXpress Automation under a separate Sage 300 login to avoid locking the session date.", clientDesc:"RecXpress Automation should run under its own Sage 300 user to avoid impacting other users."},
        ],
        notes:"These tips save significant support time — cover them before wrapping up.",
      },
      {
        id:10, type:"checklist",
        title:"Setup Checklist",
        clientTitle:"Your Setup Journey",
        checklist:[
          "Confirm SFTP method with your bank (Password / Key File / 2FA)",
          "Obtain Host IP Address, Username and Password (or Key File) from your bank",
          "Generate SSH keys using ssh-keygen -m PEM if using Key File method",
          "Navigate to Bank Account > RecXpress tab in Sage 300 Cashbook",
          "Enter SFTP connection details and set Download / Archive paths",
          "Click Test Connection and verify result via View Log",
          "Confirm successful file retrieval before going live",
        ],
        clientChecklist:[
          "Contact your bank to request SFTP access and credentials",
          "Share credentials securely with your Sage 300 consultant",
          "Consultant configures RecXpress with your bank details",
          "Test connection is run and confirmed successful",
          "First automatic statement retrieval is verified",
          "You are live — statements import automatically from now on",
        ],
        notes:"Leave this slide up during Q&A. A ready-to-use checklist partners can follow with their clients.",
      },
    ];

    /* ── HTML generator for print iframe ──────────────────────────────── */
    function getSlideHTML(slide, client) {
      const title = client ? (slide.clientTitle || slide.title) : slide.title;
      const ac = BRAND.accent, dk = BRAND.dark;
      const badge = (n, bg) => `<span style="display:inline-flex;align-items:center;justify-content:center;min-width:20px;width:20px;height:20px;background:${bg};color:#fff;border-radius:50%;font-weight:700;font-size:10px;flex-shrink:0;">${n}</span>`;
      const header = `<div style="border-bottom:3px solid ${ac};padding-bottom:8px;margin-bottom:12px;"><h2 style="margin:0;font-size:18px;font-weight:800;color:${dk};">${title}</h2></div>`;

      if (slide.type === "title") {
        const t = client ? slide.clientTitle : slide.title;
        const s = client ? slide.clientSubtitle : slide.subtitle;
        return `<div style="background:${dk};color:#fff;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:32px 48px;box-sizing:border-box;"><div style="font-size:18px;font-weight:800;color:${ac};margin-bottom:16px;">Peresoft</div><h1 style="font-size:26px;font-weight:800;margin:0 0 10px;">${t}</h1><p style="font-size:14px;color:#b0b8c1;margin:0;">${s}</p><div style="margin-top:20px;width:40px;height:4px;background:${ac};border-radius:2px;"></div></div>`;
      }
      if (slide.type === "bullets") {
        const pts = (client && slide.clientPoints) ? slide.clientPoints : slide.points;
        return `<div style="padding:20px 24px;box-sizing:border-box;height:100%;">${header}${pts.map((p,i) => `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:9px;">${badge(i+1,ac)}<span style="font-size:13px;line-height:1.4;">${p}</span></div>`).join("")}</div>`;
      }
      if (slide.type === "steps") {
        const st = (client && slide.clientSteps) ? slide.clientSteps : slide.steps;
        return `<div style="padding:20px 24px;box-sizing:border-box;height:100%;">${header}${st.map((s,i) => `<div style="display:flex;gap:10px;align-items:center;background:${i%2===0?"#f5f5f5":"#e8e8e8"};border-radius:6px;padding:8px 12px;margin-bottom:7px;">${badge(s.step,dk)}<span style="font-size:13px;">${s.label}</span></div>`).join("")}</div>`;
      }
      if (slide.type === "methods") {
        return `<div style="padding:20px 24px;box-sizing:border-box;height:100%;">${header}<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">${slide.methods.map(m => `<div style="border-left:4px solid ${ac};background:#f5f5f5;border-radius:6px;padding:9px 12px;"><div style="font-weight:700;font-size:12px;margin-bottom:3px;">${m.icon} ${m.name}</div><div style="font-size:11px;color:#444;">${client&&m.clientDesc?m.clientDesc:m.desc}</div></div>`).join("")}</div></div>`;
      }
      if (slide.type === "table") {
        return `<div style="padding:20px 24px;box-sizing:border-box;height:100%;">${header}<table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;"><colgroup><col style="width:32%"/><col style="width:68%"/></colgroup><thead><tr style="background:${dk};color:#fff;"><th style="padding:7px 10px;text-align:left;">${client?"Detail":"Field"}</th><th style="padding:7px 10px;text-align:left;">Description</th></tr></thead><tbody>${slide.rows.map((r,i) => `<tr style="background:${i%2===0?"#f5f5f5":"#e8e8e8"};"><td style="padding:7px 10px;font-weight:700;color:${ac};word-break:break-word;">${r.field}</td><td style="padding:7px 10px;word-break:break-word;">${client&&r.clientValue?r.clientValue:r.value}</td></tr>`).join("")}</tbody></table></div>`;
      }
      if (slide.type === "keyfile") {
        const kst = (client && slide.clientSteps) ? slide.clientSteps : slide.steps;
        const note = client ? slide.clientNote : slide.warning;
        return `<div style="padding:20px 24px;box-sizing:border-box;height:100%;">${header}${kst.map(s => `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;">${badge(s.step,ac)}<span style="font-size:13px;line-height:1.4;">${s.label}</span></div>`).join("")}${note?`<div style="margin-top:8px;background:${client?"#e8f4fd":"#fff3cd"};border:1px solid ${client?"#90caf9":"#f0c040"};border-radius:6px;padding:7px 12px;font-size:11px;color:${client?"#1a5276":"#7a5c00"};">${client?"ℹ️ ":"⚠️ "}${note}</div>`:""}</div>`;
      }
      if (slide.type === "rebex") {
        const ri = (client && slide.clientIntro) ? slide.clientIntro : slide.intro;
        const rst = (client && slide.clientSteps) ? slide.clientSteps : slide.steps;
        return `<div style="padding:20px 24px;box-sizing:border-box;height:100%;">${header}<div style="background:${dk};color:#b0b8c1;border-radius:6px;padding:7px 12px;font-size:11px;margin-bottom:10px;">${ri}</div>${rst.map(s => `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;">${badge(s.step,dk)}<span style="font-size:13px;line-height:1.4;">${s.label}</span></div>`).join("")}</div>`;
      }
      if (slide.type === "tips") {
        return `<div style="padding:20px 24px;box-sizing:border-box;height:100%;">${header}${slide.tips.map(t => `<div style="display:flex;gap:10px;align-items:flex-start;background:#f5f5f5;border-radius:6px;padding:8px 12px;margin-bottom:8px;"><span style="font-size:16px;flex-shrink:0;">${t.icon}</span><div><div style="font-weight:700;font-size:12px;margin-bottom:2px;">${t.label}</div><div style="font-size:11px;color:#555;">${client&&t.clientDesc?t.clientDesc:t.desc}</div></div></div>`).join("")}</div>`;
      }
      if (slide.type === "checklist") {
        const items = (client && slide.clientChecklist) ? slide.clientChecklist : slide.checklist;
        return `<div style="padding:20px 24px;box-sizing:border-box;height:100%;">${header}${items.map(item => `<div style="display:flex;gap:10px;align-items:center;background:#f5f5f5;border-radius:6px;padding:8px 12px;margin-bottom:7px;"><div style="width:18px;height:18px;border-radius:50%;border:2px solid #bbb;background:#fff;flex-shrink:0;"></div><span style="font-size:13px;">${item}</span></div>`).join("")}</div>`;
      }
      return `<div style="padding:24px;">${title}</div>`;
    }

    /* ── Print helper ──────────────────────────────────────────────────── */
    function printSlides(client) {
      const slidePages = slides.map((s, idx) => {
        const content = getSlideHTML(s, client);
        const notes = (!client && s.notes)
          ? `<div style="margin-top:5px;background:#fffde7;border:1px solid #f0c040;border-radius:4px;padding:6px 10px;font-size:10px;color:#5a4a00;"><strong>Notes:</strong> ${s.notes}</div>`
          : "";
        return `<div style="page-break-after:always;padding:8mm;box-sizing:border-box;"><div style="font-size:9px;color:#999;text-align:right;margin-bottom:3px;">${idx+1} / ${slides.length}</div><div style="width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:6px;border:1px solid #ddd;">${content}</div>${notes}</div>`;
      }).join("");

      const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>RecXpress SFTP</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;}@page{size:A4 landscape;margin:10mm;}@media print{body{margin:0;}}</style></head><body>${slidePages}</body></html>`;

      const old = document.getElementById("ps-print-frame");
      if (old) old.remove();

      const iframe = document.createElement("iframe");
      iframe.id = "ps-print-frame";
      iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:297mm;height:210mm;border:none;visibility:hidden;";
      document.body.appendChild(iframe);

      iframe.onload = () => {
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
      };
      iframe.srcdoc = html;
    }

    /* ── Shared UI components ──────────────────────────────────────────── */
    function SlideHeader({ title }) {
      return (
        <div style={{ borderBottom: `3px solid ${BRAND.accent}`, paddingBottom: 10, marginBottom: 14, flexShrink: 0 }}>
          <h2 style={{ margin: 0, fontSize: 21, fontWeight: 800, color: BRAND.dark, lineHeight: 1.2 }}>{title}</h2>
        </div>
      );
    }

    function NumBadge({ n, bg }) {
      return (
        <span style={{ minWidth:22, width:22, height:22, background: bg||BRAND.accent, color:"#fff", borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:11, flexShrink:0 }}>{n}</span>
      );
    }

    function NavBtn({ label, onClick, disabled }) {
      return (
        <button onClick={onClick} disabled={disabled} style={{ background:"#444", color:"#fff", border:"none", borderRadius:6, padding:"7px 14px", cursor: disabled?"not-allowed":"pointer", opacity: disabled?0.4:1, fontSize:13 }}>{label}</button>
      );
    }

    /* ── Slide renderers ───────────────────────────────────────────────── */
    function TitleSlide({ slide, client }) {
      const t = client ? slide.clientTitle : slide.title;
      const s = client ? slide.clientSubtitle : slide.subtitle;
      return (
        <div style={{ background:BRAND.dark, color:BRAND.white, width:"100%", height:"100%", display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center", boxSizing:"border-box", padding:"32px 48px", overflow:"hidden" }}>
          <div style={{ fontSize:18, fontWeight:800, color:BRAND.accent, letterSpacing:1, marginBottom:20 }}>Peresoft</div>
          <h1 style={{ fontSize:34, fontWeight:800, margin:"0 0 12px", lineHeight:1.15 }}>{t}</h1>
          <p style={{ fontSize:17, color:"#b0b8c1", margin:0 }}>{s}</p>
          <div style={{ marginTop:28, width:50, height:4, background:BRAND.accent, borderRadius:2 }} />
        </div>
      );
    }

    function BulletsSlide({ slide, client }) {
      const pts = (client && slide.clientPoints) ? slide.clientPoints : slide.points;
      const title = (client && slide.clientTitle) ? slide.clientTitle : slide.title;
      return (
        <div style={{ width:"100%", height:"100%", boxSizing:"border-box", padding:"24px 32px", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <SlideHeader title={(slide.icon ? slide.icon+" " : "")+title} />
          <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center", gap:10, overflow:"hidden" }}>
            {pts.map((p,i) => (
              <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start", flexShrink:0 }}>
                <NumBadge n={i+1} />
                <span style={{ fontSize:14.5, color:BRAND.text, lineHeight:1.45 }}>{p}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function StepsSlide({ slide, client }) {
      const title = (client && slide.clientTitle) ? slide.clientTitle : slide.title;
      const steps = (client && slide.clientSteps) ? slide.clientSteps : slide.steps;
      return (
        <div style={{ width:"100%", height:"100%", boxSizing:"border-box", padding:"24px 32px", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <SlideHeader title={title} />
          <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center", gap:10, overflow:"hidden" }}>
            {steps.map((s,i) => (
              <div key={i} style={{ display:"flex", gap:12, alignItems:"center", background: i%2===0?BRAND.light:BRAND.mid, borderRadius:7, padding:"10px 14px", flexShrink:0 }}>
                <NumBadge n={s.step} bg={BRAND.dark} />
                <span style={{ fontSize:14, color:BRAND.text, lineHeight:1.35 }}>{s.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MethodsSlide({ slide, client }) {
      const title = (client && slide.clientTitle) ? slide.clientTitle : slide.title;
      return (
        <div style={{ width:"100%", height:"100%", boxSizing:"border-box", padding:"24px 32px", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <SlideHeader title={title} />
          <div style={{ flex:1, display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, alignContent:"center", overflow:"hidden" }}>
            {slide.methods.map((m,i) => (
              <div key={i} style={{ borderLeft:`4px solid ${BRAND.accent}`, background:BRAND.light, borderRadius:7, padding:"10px 14px", overflow:"hidden" }}>
                <div style={{ fontWeight:700, fontSize:13, marginBottom:4 }}>{m.icon} {m.name}</div>
                <div style={{ fontSize:12, color:"#444", lineHeight:1.35 }}>{client&&m.clientDesc?m.clientDesc:m.desc}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function TableSlide({ slide, client }) {
      const title = (client && slide.clientTitle) ? slide.clientTitle : slide.title;
      return (
        <div style={{ width:"100%", height:"100%", boxSizing:"border-box", padding:"24px 32px", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <SlideHeader title={title} />
          <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center", overflow:"hidden" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12.5, tableLayout:"fixed" }}>
              <colgroup><col style={{ width:"32%" }} /><col style={{ width:"68%" }} /></colgroup>
              <thead>
                <tr style={{ background:BRAND.dark, color:"#fff" }}>
                  <th style={{ padding:"8px 12px", textAlign:"left" }}>{client?"Detail":"Field"}</th>
                  <th style={{ padding:"8px 12px", textAlign:"left" }}>Description</th>
                </tr>
              </thead>
              <tbody>
                {slide.rows.map((r,i) => (
                  <tr key={i} style={{ background: i%2===0?BRAND.light:BRAND.mid }}>
                    <td style={{ padding:"8px 12px", fontWeight:700, color:BRAND.accent, wordBreak:"break-word" }}>{r.field}</td>
                    <td style={{ padding:"8px 12px", color:BRAND.text, wordBreak:"break-word" }}>{client&&r.clientValue?r.clientValue:r.value}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function KeyFileSlide({ slide, client }) {
      const title = (client && slide.clientTitle) ? slide.clientTitle : slide.title;
      const steps = (client && slide.clientSteps) ? slide.clientSteps : slide.steps;
      const note = client ? slide.clientNote : slide.warning;
      return (
        <div style={{ width:"100%", height:"100%", boxSizing:"border-box", padding:"24px 32px", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <SlideHeader title={title} />
          <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center", gap:8, overflow:"hidden" }}>
            {steps.map((s,i) => (
              <div key={i} style={{ display:"flex", gap:10, alignItems:"flex-start", flexShrink:0 }}>
                <NumBadge n={s.step} />
                <span style={{ fontSize:13.5, color:BRAND.text, lineHeight:1.4 }}>{s.label}</span>
              </div>
            ))}
            {note && (
              <div style={{ marginTop:8, background: client?"#e8f4fd":"#fff3cd", border:`1px solid ${client?"#90caf9":"#f0c040"}`, borderRadius:7, padding:"8px 14px", fontSize:12, color: client?"#1a5276":"#7a5c00", flexShrink:0 }}>
                {client?"ℹ️":"⚠️"} {note}
              </div>
            )}
          </div>
        </div>
      );
    }

    function RebexSlide({ slide, client }) {
      const title = (client && slide.clientTitle) ? slide.clientTitle : slide.title;
      const intro = (client && slide.clientIntro) ? slide.clientIntro : slide.intro;
      const steps = (client && slide.clientSteps) ? slide.clientSteps : slide.steps;
      return (
        <div style={{ width:"100%", height:"100%", boxSizing:"border-box", padding:"24px 32px", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <SlideHeader title={title} />
          <div style={{ background:BRAND.dark, color:"#b0b8c1", borderRadius:7, padding:"8px 14px", fontSize:12, marginBottom:12, flexShrink:0 }}>{intro}</div>
          <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center", gap:9, overflow:"hidden" }}>
            {steps.map((s,i) => (
              <div key={i} style={{ display:"flex", gap:10, alignItems:"flex-start", flexShrink:0 }}>
                <NumBadge n={s.step} bg={BRAND.dark} />
                <span style={{ fontSize:13.5, color:BRAND.text, lineHeight:1.4 }}>{s.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function TipsSlide({ slide, client }) {
      const title = (client && slide.clientTitle) ? slide.clientTitle : slide.title;
      return (
        <div style={{ width:"100%", height:"100%", boxSizing:"border-box", padding:"24px 32px", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <SlideHeader title={title} />
          <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center", gap:9, overflow:"hidden" }}>
            {slide.tips.map((t,i) => (
              <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start", background:BRAND.light, borderRadius:7, padding:"9px 14px", flexShrink:0 }}>
                <span style={{ fontSize:18, flexShrink:0 }}>{t.icon}</span>
                <div style={{ overflow:"hidden" }}>
                  <div style={{ fontWeight:700, fontSize:13, color:BRAND.dark, marginBottom:2 }}>{t.label}</div>
                  <div style={{ fontSize:12, color:"#555", lineHeight:1.35 }}>{client&&t.clientDesc?t.clientDesc:t.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ChecklistSlide({ slide, client }) {
      const items = (client && slide.clientChecklist) ? slide.clientChecklist : slide.checklist;
      const title = (client && slide.clientTitle) ? slide.clientTitle : slide.title;
      const [checked, setChecked] = useState(new Array(10).fill(false));
      const toggle = (i) => setChecked(c => { const n=[...c]; n[i]=!n[i]; return n; });
      return (
        <div style={{ width:"100%", height:"100%", boxSizing:"border-box", padding:"24px 32px", display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <SlideHeader title={title} />
          <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center", gap:8, overflow:"hidden" }}>
            {items.map((item,i) => (
              <div key={i} onClick={() => toggle(i)} style={{ display:"flex", gap:12, alignItems:"center", background: checked[i]?"#e6f9ec":BRAND.light, borderRadius:7, padding:"9px 14px", cursor:"pointer", border:`1px solid ${checked[i]?"#4caf7d":"transparent"}`, transition:"all 0.2s", flexShrink:0 }}>
                <div style={{ minWidth:20, width:20, height:20, borderRadius:"50%", border:`2px solid ${checked[i]?"#4caf7d":"#bbb"}`, background: checked[i]?"#4caf7d":"#fff", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  {checked[i] && <span style={{ color:"#fff", fontSize:11, fontWeight:700 }}>✓</span>}
                </div>
                <span style={{ fontSize:13, color: checked[i]?"#2e7d50":BRAND.text, textDecoration: checked[i]?"line-through":"none", lineHeight:1.35 }}>{item}</span>
              </div>
            ))}
          </div>
          <div style={{ textAlign:"center", fontSize:11, color:"#aaa", marginTop:6, flexShrink:0 }}>Click items to mark complete</div>
        </div>
      );
    }

    function renderSlide(slide, client) {
      const p = { slide, client };
      switch (slide.type) {
        case "title":     return <TitleSlide {...p} />;
        case "bullets":   return <BulletsSlide {...p} />;
        case "steps":     return <StepsSlide {...p} />;
        case "methods":   return <MethodsSlide {...p} />;
        case "table":     return <TableSlide {...p} />;
        case "keyfile":   return <KeyFileSlide {...p} />;
        case "rebex":     return <RebexSlide {...p} />;
        case "tips":      return <TipsSlide {...p} />;
        case "checklist": return <ChecklistSlide {...p} />;
        default:          return null;
      }
    }

    /* ── PDF Modal ─────────────────────────────────────────────────────── */
    function PDFModal({ client, onClose }) {
      const [page, setPage] = useState(0);
      const total = slides.length;
      const slide = slides[page];
      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", zIndex:9999, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:20, boxSizing:"border-box" }}>
          <div style={{ width:"100%", maxWidth:820, display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, flexWrap:"wrap", gap:8 }}>
            <div>
              <span style={{ color:"#fff", fontWeight:700, fontSize:14 }}>{client?"🤝 Client Version":"📋 Partner Version"}</span>
              <span style={{ color:"#aaa", fontSize:12, marginLeft:10 }}>Slide {page+1} of {total}</span>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => printSlides(client)} style={{ background:BRAND.accent, color:"#fff", border:"none", borderRadius:6, padding:"7px 16px", cursor:"pointer", fontWeight:700, fontSize:13 }}>🖨 Print / Save as PDF</button>
              <button onClick={onClose} style={{ background:"#444", color:"#fff", border:"none", borderRadius:6, padding:"7px 14px", cursor:"pointer", fontSize:13 }}>✕ Close</button>
            </div>
          </div>
          <div style={{ width:"100%", maxWidth:820, position:"relative", paddingTop:"56.25%", flexShrink:0 }}>
            <div style={{ position:"absolute", inset:0, background:"#fff", borderRadius:10, overflow:"hidden", boxShadow:"0 8px 40px rgba(0,0,0,0.6)" }} dangerouslySetInnerHTML={{ __html: getSlideHTML(slide, client) }} />
          </div>
          {!client && slide.notes && (
            <div style={{ width:"100%", maxWidth:820, marginTop:8, background:"#fffde7", border:"1px solid #f0e060", borderRadius:8, padding:"8px 14px", fontSize:12, color:"#5a4a00" }}>
              <strong>🗒 Notes:</strong> {slide.notes}
            </div>
          )}
          <div style={{ display:"flex", gap:10, marginTop:12, alignItems:"center" }}>
            <NavBtn label="⏮" onClick={() => setPage(0)} disabled={page===0} />
            <NavBtn label="‹" onClick={() => setPage(p => Math.max(0,p-1))} disabled={page===0} />
            <div style={{ display:"flex", gap:5 }}>
              {slides.map((_,i) => <div key={i} onClick={() => setPage(i)} style={{ width:i===page?18:6, height:6, borderRadius:3, background:i===page?BRAND.accent:"#666", cursor:"pointer", transition:"all 0.2s" }} />)}
            </div>
            <NavBtn label="›" onClick={() => setPage(p => Math.min(total-1,p+1))} disabled={page===total-1} />
            <NavBtn label="⏭" onClick={() => setPage(total-1)} disabled={page===total-1} />
          </div>
        </div>
      );
    }

    /* ── App ───────────────────────────────────────────────────────────── */
    function App() {
      const [current, setCurrent] = useState(0);
      const [showNotes, setShowNotes] = useState(false);
      const [clientMode, setClientMode] = useState(false);
      const [showPDFMenu, setShowPDFMenu] = useState(false);
      const [printMode, setPrintMode] = useState(false);
      const [printClient, setPrintClient] = useState(false);
      const total = slides.length;
      const slide = slides[current];

      return (
        <div style={{ fontFamily:"'Segoe UI',Arial,sans-serif", background:"#2a2a2a", minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"16px", boxSizing:"border-box" }}>

          {printMode && <PDFModal client={printClient} onClose={() => setPrintMode(false)} />}

          {/* Top bar */}
          <div style={{ width:"100%", maxWidth:820, display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, flexShrink:0, gap:8, flexWrap:"wrap" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ color:"#aaa", fontSize:12 }}>Slide {current+1} of {total}</span>
              {clientMode && <span style={{ background:"#4caf7d", color:"#fff", fontSize:10, fontWeight:700, borderRadius:4, padding:"2px 8px" }}>CLIENT VIEW</span>}
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
              <div style={{ display:"flex", alignItems:"center", gap:7, background:"#3a3a3a", borderRadius:8, padding:"5px 12px" }}>
                <span style={{ fontSize:11, color:clientMode?"#888":"#fff", fontWeight:clientMode?400:600 }}>Partner</span>
                <div onClick={() => setClientMode(m => !m)} style={{ width:36, height:20, background:clientMode?"#4caf7d":"#666", borderRadius:10, position:"relative", cursor:"pointer", transition:"background 0.2s", flexShrink:0 }}>
                  <div style={{ position:"absolute", top:2, left:clientMode?18:2, width:16, height:16, borderRadius:"50%", background:"#fff", transition:"left 0.2s" }} />
                </div>
                <span style={{ fontSize:11, color:clientMode?"#fff":"#888", fontWeight:clientMode?600:400 }}>Client</span>
              </div>
              <div style={{ position:"relative" }}>
                <button onClick={() => setShowPDFMenu(m => !m)} style={{ background:BRAND.accent, color:"#fff", border:"none", borderRadius:6, padding:"6px 13px", cursor:"pointer", fontSize:12, fontWeight:600 }}>
                  ⬇ PDF {showPDFMenu?"▲":"▼"}
                </button>
                {showPDFMenu && (
                  <div style={{ position:"absolute", right:0, top:"110%", background:"#fff", borderRadius:8, boxShadow:"0 4px 20px rgba(0,0,0,0.3)", overflow:"hidden", zIndex:100, minWidth:190 }}>
                    <div onClick={() => { setPrintClient(false); setPrintMode(true); setShowPDFMenu(false); }} style={{ padding:"11px 16px", fontSize:13, cursor:"pointer", borderBottom:"1px solid #eee", color:BRAND.dark }} onMouseEnter={e => e.currentTarget.style.background="#f5f5f5"} onMouseLeave={e => e.currentTarget.style.background="#fff"}>
                      📋 Partner Version<span style={{ fontSize:11, color:"#888", display:"block" }}>With speaker notes</span>
                    </div>
                    <div onClick={() => { setPrintClient(true); setPrintMode(true); setShowPDFMenu(false); }} style={{ padding:"11px 16px", fontSize:13, cursor:"pointer", color:BRAND.dark }} onMouseEnter={e => e.currentTarget.style.background="#f5f5f5"} onMouseLeave={e => e.currentTarget.style.background="#fff"}>
                      🤝 Client Version<span style={{ fontSize:11, color:"#888", display:"block" }}>Plain language, no notes</span>
                    </div>
                  </div>
                )}
              </div>
              <button onClick={() => setShowNotes(n => !n)} style={{ background:showNotes?"#555":"#444", color:"#fff", border:"none", borderRadius:6, padding:"6px 12px", cursor:"pointer", fontSize:12 }}>🗒 Notes</button>
            </div>
          </div>

          {/* Slide */}
          <div style={{ width:"100%", maxWidth:820, flexShrink:0 }} onClick={() => { if(showPDFMenu) setShowPDFMenu(false); }}>
            <div style={{ position:"relative", width:"100%", paddingTop:"56.25%" }}>
              <div style={{ position:"absolute", inset:0, background:"#fff", borderRadius:10, overflow:"hidden", boxShadow:"0 8px 40px rgba(0,0,0,0.5)", border:`2px solid ${clientMode?"#4caf7d":"transparent"}`, transition:"border 0.3s" }}>
                {renderSlide(slide, clientMode)}
              </div>
            </div>
          </div>

          {/* Notes */}
          {showNotes && !clientMode && slide.notes && (
            <div style={{ width:"100%", maxWidth:820, marginTop:8, background:"#fffde7", border:"1px solid #f0e060", borderRadius:8, padding:"10px 16px", fontSize:12, color:"#5a4a00", flexShrink:0, boxSizing:"border-box" }}>
              <strong>🗒 Speaker Notes:</strong> {slide.notes}
            </div>
          )}

          {/* Nav */}
          <div style={{ display:"flex", gap:10, marginTop:12, alignItems:"center", flexShrink:0, flexWrap:"wrap", justifyContent:"center" }}>
            <NavBtn label="⏮" onClick={() => setCurrent(0)} disabled={current===0} />
            <NavBtn label="‹ Prev" onClick={() => setCurrent(c => Math.max(0,c-1))} disabled={current===0} />
            <div style={{ display:"flex", gap:5, alignItems:"center" }}>
              {slides.map((_,i) => <div key={i} onClick={() => setCurrent(i)} style={{ width:i===current?20:7, height:7, borderRadius:4, background:i===current?(clientMode?"#4caf7d":BRAND.accent):"#666", cursor:"pointer", transition:"all 0.2s", flexShrink:0 }} />)}
            </div>
            <NavBtn label="Next ›" onClick={() => setCurrent(c => Math.min(total-1,c+1))} disabled={current===total-1} />
            <NavBtn label="⏭" onClick={() => setCurrent(total-1)} disabled={current===total-1} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
